<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<title>РАДАР — Нет соединения</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:#060918;color:#f1f5f9;
  display:flex;align-items:center;justify-content:center;min-height:100vh;
  text-align:center;padding:24px}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse at 50% 40%,rgba(6,182,212,.05),transparent 60%)}
.icon{font-size:64px;margin-bottom:24px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
h1{font-size:22px;font-weight:800;letter-spacing:4px;
  background:linear-gradient(135deg,#06b6d4,#3b82f6);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px}
p{color:#64748b;font-size:14px;margin-bottom:28px;line-height:1.7}
button{padding:14px 36px;background:linear-gradient(135deg,#06b6d4,#3b82f6);
  color:#fff;border:none;border-radius:14px;font-size:14px;font-weight:700;
  cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
button:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(6,182,212,.25)}
button:active{transform:scale(.97)}
</style>
</head>
<body>
<div>
  <div class="icon">📡</div>
  <h1>РАДАР</h1>
  <p>Нет подключения к серверу мониторинга.<br>
     Проверьте соединение и повторите попытку.</p>
  <button onclick="location.reload()">Обновить</button>
</div>
</body>
</html>
